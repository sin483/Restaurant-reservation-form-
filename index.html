<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Restaurant reservation form">
    <title>Restaurant Reservation Form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .form-control:focus {
            border-color: #007bff;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Reserve Your Table</h1>
        <form action="submit_reservation.php" method="POST">
            <div class="form-group">
                <label for="name">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="email">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="date">Reservation Date <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
            <div class="form-group">
                <label for="time">Reservation Time <span class="text-danger">*</span></label>
                <input type="time" class="form-control" id="time" name="time" required>
            </div>
            <div class="form-group">
                <label for="people">Number of Guests <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="people" name="people" required min="1" max="20" placeholder="Enter number of guests">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Submit Reservation</button>
        </form>
    </div>
    <script>
        // Optional: Custom validation scripts can go here
    </script>
</body>
</html>
